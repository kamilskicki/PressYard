services:
  reverse-proxy:
    image: ${TRAEFIK_IMAGE:-traefik:v3.1}
    restart: unless-stopped
    init: true
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "${PROXY_BIND_ADDRESS:-127.0.0.1}:${PROXY_HTTP_PORT:-80}:80"
      - "${PROXY_BIND_ADDRESS:-127.0.0.1}:${PROXY_DASHBOARD_PORT:-8089}:8080"
    volumes:
      - ${PROXY_CONFIG_DIR}:/etc/traefik/dynamic
