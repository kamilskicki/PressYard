services:
  db:
    image: ${MARIADB_IMAGE:-mariadb:11.4.10}
    restart: unless-stopped
    init: true
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-log-bin
      - --performance-schema=OFF
      - --max-connections=40
      - --innodb-buffer-pool-size=64M
      - --innodb-log-buffer-size=16M
    environment:
      MARIADB_DATABASE: ${WORDPRESS_DB_NAME:-wordpress}
      MARIADB_USER: ${WORDPRESS_DB_USER:-wordpress}
      MARIADB_PASSWORD: ${WORDPRESS_DB_PASSWORD:?WORDPRESS_DB_PASSWORD is required}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD is required}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$$MARIADB_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  wordpress:
    image: ${WORDPRESS_IMAGE:-wordpress:php8.2-apache}
    restart: unless-stopped
    init: true
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WORDPRESS_BIND_ADDRESS:-127.0.0.1}:${WORDPRESS_PUBLISHED_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:?WORDPRESS_DB_PASSWORD is required}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
      WORDPRESS_DEBUG: ${WP_DEBUG:-0}
      PRESSYARD_ENABLE_MAILPIT: ${ENABLE_MAILPIT:-false}
      PRESSYARD_MAILPIT_HOST: mailpit
      PRESSYARD_MAILPIT_PORT: 1025
      PRESSYARD_MAILPIT_FROM_EMAIL: ${WP_ADMIN_EMAIL:-admin@example.com}
      PRESSYARD_MAILPIT_FROM_NAME: ${WP_SITE_TITLE:-Local WordPress}
      WORDPRESS_CONFIG_EXTRA: |
        $$forwarded_host = $$_SERVER['HTTP_X_FORWARDED_HOST'] ?? '';
        $$request_host = $$_SERVER['HTTP_HOST'] ?? '${WP_HOSTNAME:-localhost}';
        $$wp_host = $$forwarded_host !== '' ? $$forwarded_host : $$request_host;
        if (!defined('WP_HOME')) {
          define('WP_HOME', 'http://' . $$wp_host);
        }
        if (!defined('WP_SITEURL')) {
          define('WP_SITEURL', 'http://' . $$wp_host);
        }
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
          $$_SERVER['HTTPS'] = 'on';
        }
        define('FS_METHOD', 'direct');
        define('DISALLOW_FILE_EDIT', false);
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/plugins:/var/www/html/wp-content/plugins
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./wp-content/themes:/var/www/html/wp-content/themes
      - ./wp-content/uploads:/var/www/html/wp-content/uploads
      - ./php/conf.d/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    healthcheck:
      test: ["CMD", "php", "-r", "exit((int)!@fsockopen('127.0.0.1', 80));"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  wp-init:
    image: ${WORDPRESS_CLI_IMAGE:-wordpress:cli-php8.2}
    restart: "no"
    init: true
    user: "0:0"
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:?WORDPRESS_DB_PASSWORD is required}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
      WP_URL: ${WP_URL:-http://localhost:8080}
      WP_SITE_TITLE: ${WP_SITE_TITLE:-Local WordPress}
      WP_ADMIN_USER: ${WP_ADMIN_USER:-admin}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD:?WP_ADMIN_PASSWORD is required}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL:-admin@example.com}
      WP_STATE_DIR: /var/www/state
      WP_PACKAGE_DIRS: /workspace/packages
      PRESSYARD_ENABLE_MAILPIT: ${ENABLE_MAILPIT:-false}
      PRESSYARD_MAILPIT_HOST: mailpit
      PRESSYARD_MAILPIT_PORT: 1025
      PRESSYARD_MAILPIT_FROM_EMAIL: ${WP_ADMIN_EMAIL:-admin@example.com}
      PRESSYARD_MAILPIT_FROM_NAME: ${WP_SITE_TITLE:-Local WordPress}
    volumes:
      - wp_data:/var/www/html
      - wp_state:/var/www/state
      - ./wp-content/plugins:/var/www/html/wp-content/plugins
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./wp-content/themes:/var/www/html/wp-content/themes
      - ./wp-content/uploads:/var/www/html/wp-content/uploads
      - ./:/workspace:ro
      - ./scripts/init-wordpress.sh:/usr/local/bin/init-wordpress.sh:ro
    entrypoint: ["bash", "/usr/local/bin/init-wordpress.sh"]

  wp-cli:
    image: ${WORDPRESS_CLI_IMAGE:-wordpress:cli-php8.2}
    restart: "no"
    init: true
    user: "0:0"
    profiles:
      - ops
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:?WORDPRESS_DB_PASSWORD is required}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
      PRESSYARD_ENABLE_MAILPIT: ${ENABLE_MAILPIT:-false}
      PRESSYARD_MAILPIT_HOST: mailpit
      PRESSYARD_MAILPIT_PORT: 1025
      PRESSYARD_MAILPIT_FROM_EMAIL: ${WP_ADMIN_EMAIL:-admin@example.com}
      PRESSYARD_MAILPIT_FROM_NAME: ${WP_SITE_TITLE:-Local WordPress}
    volumes:
      - wp_data:/var/www/html
      - wp_state:/var/www/state
      - ./wp-content/plugins:/var/www/html/wp-content/plugins
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./wp-content/themes:/var/www/html/wp-content/themes
      - ./wp-content/uploads:/var/www/html/wp-content/uploads
      - ./:/workspace:ro
    entrypoint: ["wp", "--allow-root", "--path=/var/www/html"]

  adminer:
    image: ${ADMINER_IMAGE:-adminer:4.8.1-standalone}
    restart: unless-stopped
    init: true
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "${WORDPRESS_BIND_ADDRESS:-127.0.0.1}:${ADMINER_PUBLISHED_PORT:-18080}:8080"
    profiles:
      - tools

  mailpit:
    image: ${MAILPIT_IMAGE:-axllent/mailpit:v1.29.2}
    restart: unless-stopped
    init: true
    ports:
      - "${WORDPRESS_BIND_ADDRESS:-127.0.0.1}:${MAILPIT_PUBLISHED_PORT:-18081}:8025"
    profiles:
      - mail

volumes:
  db_data:
  wp_data:
  wp_state:
